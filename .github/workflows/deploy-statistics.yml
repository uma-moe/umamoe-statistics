name: Build And Deploy Statistics

on:
  schedule:
    # Sunday 00:00 JST. GitHub Actions cron uses UTC.
    - cron: '0 15 * * 6'
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deployment target
        required: true
        default: both
        type: choice
        options:
          - beta
          - production
          - both
      dataset_version:
        description: Optional dataset id, for example 2026-W19. Empty uses the generator default.
        required: false
        default: ''
        type: string
      limit:
        description: Optional row limit for smoke runs. Leave empty for the full dataset.
        required: false
        default: ''
        type: string
      worker_threads:
        description: Parallel aggregation workers. Use 3 for moderate CPU, 1 for serial mode.
        required: false
        default: '3'
        type: string
      batch_rows:
        description: Rows per worker batch before the next trainer boundary.
        required: false
        default: '100000'
        type: string
      run_statistics_now:
        description: Run the statistics export immediately after deploying the Docker image.
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  PLATFORM: linux/amd64
  CACHE_SCOPE: statistics-container
  DEPLOY_USER: github
  REMOTE_IMAGE_DIR: /tmp/umamoe-statistics-images
  IMAGE_NAME: umamoe-statistics-generator
  ENV_FILE: /opt/umamoe-statistics/statistics.env
  PROD_FRONTEND_ROOT: /var/www/html/umamoe
  BETA_FRONTEND_ROOT: /var/www/html/umamoe_beta
  STATISTICS_RELATIVE_DIR: assets/statistics

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Statistics Image
    runs-on: ubuntu-latest
    outputs:
      archive_name: ${{ steps.meta.outputs.archive_name }}
      dataset_version: ${{ steps.plan.outputs.dataset_version }}
      deploy_target: ${{ steps.plan.outputs.deploy_target }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      limit: ${{ steps.plan.outputs.limit }}
      run_statistics_now: ${{ steps.plan.outputs.run_statistics_now }}
      worker_threads: ${{ steps.plan.outputs.worker_threads }}
      batch_rows: ${{ steps.plan.outputs.batch_rows }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Choose deployment plan
        id: plan
        shell: bash
        run: |
          deploy_target="${{ github.event.inputs.deploy_target || 'both' }}"
          dataset_version="${{ github.event.inputs.dataset_version || '' }}"
          limit="${{ github.event.inputs.limit || '' }}"
          worker_threads="${{ github.event.inputs.worker_threads || '3' }}"
          batch_rows="${{ github.event.inputs.batch_rows || '100000' }}"
          run_statistics_now="${{ github.event.inputs.run_statistics_now || 'true' }}"

          validate_positive_int() {
            local name="$1"
            local value="$2"
            if [[ ! "$value" =~ ^[1-9][0-9]*$ ]]; then
              echo "$name must be a positive integer, got: $value" >&2
              exit 1
            fi
          }

          validate_positive_int worker_threads "$worker_threads"
          validate_positive_int batch_rows "$batch_rows"

          echo "deploy_target=$deploy_target" >> "$GITHUB_OUTPUT"
          echo "dataset_version=$dataset_version" >> "$GITHUB_OUTPUT"
          echo "limit=$limit" >> "$GITHUB_OUTPUT"
          echo "worker_threads=$worker_threads" >> "$GITHUB_OUTPUT"
          echo "batch_rows=$batch_rows" >> "$GITHUB_OUTPUT"
          echo "run_statistics_now=$run_statistics_now" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image_tag="${IMAGE_NAME}:${GITHUB_SHA}"
          archive_name="${IMAGE_NAME}-${GITHUB_SHA}.tar.gz"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build statistics image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM }}
          pull: true
          load: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Save statistics image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          docker save "${{ steps.meta.outputs.image_tag }}" | gzip -1 > "${{ runner.temp }}/${{ steps.meta.outputs.archive_name }}"

      - name: Upload statistics image artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: statistics-image
          path: ${{ runner.temp }}/${{ steps.meta.outputs.archive_name }}
          if-no-files-found: error

  deploy:
    name: Deploy Statistics
    if: github.event_name != 'pull_request' && contains(fromJSON('["beta", "production", "both"]'), needs.build.outputs.deploy_target)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.build.outputs.deploy_target == 'beta' && 'beta' || 'production' }}

    steps:
      - name: Download statistics image artifact
        uses: actions/download-artifact@v4
        with:
          name: statistics-image
          path: ${{ runner.temp }}

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "DEPLOY_KNOWN_HOSTS is required for deploy host verification." >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy statistics
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DEPLOY_TARGET: ${{ needs.build.outputs.deploy_target }}
          DATASET_VERSION: ${{ needs.build.outputs.dataset_version }}
          LIMIT: ${{ needs.build.outputs.limit }}
          WORKER_THREADS: ${{ needs.build.outputs.worker_threads }}
          BATCH_ROWS: ${{ needs.build.outputs.batch_rows }}
          RUN_STATISTICS_NOW: ${{ needs.build.outputs.run_statistics_now }}
        run: |
          set -euo pipefail

          remote_archive="${REMOTE_IMAGE_DIR}/${ARCHIVE_NAME}"
          remote_env=(
            "ARCHIVE=$(printf '%q' "$remote_archive")"
            "IMAGE_TAG=$(printf '%q' "$IMAGE_TAG")"
            "DEPLOY_TARGET=$(printf '%q' "$DEPLOY_TARGET")"
            "DATASET_VERSION=$(printf '%q' "$DATASET_VERSION")"
            "LIMIT=$(printf '%q' "$LIMIT")"
            "WORKER_THREADS=$(printf '%q' "$WORKER_THREADS")"
            "BATCH_ROWS=$(printf '%q' "$BATCH_ROWS")"
            "RUN_STATISTICS_NOW=$(printf '%q' "$RUN_STATISTICS_NOW")"
            "ENV_FILE=$(printf '%q' "$ENV_FILE")"
            "PROD_FRONTEND_ROOT=$(printf '%q' "$PROD_FRONTEND_ROOT")"
            "BETA_FRONTEND_ROOT=$(printf '%q' "$BETA_FRONTEND_ROOT")"
            "STATISTICS_RELATIVE_DIR=$(printf '%q' "$STATISTICS_RELATIVE_DIR")"
          )

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_IMAGE_DIR'"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "${{ runner.temp }}/${ARCHIVE_NAME}" "$DEPLOY_USER@$DEPLOY_HOST:$remote_archive"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "${remote_env[*]} bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          archive="$ARCHIVE"
          image_tag="$IMAGE_TAG"
          deploy_target="$DEPLOY_TARGET"
          dataset_version="${DATASET_VERSION:-}"
          limit="${LIMIT:-}"
          worker_threads="${WORKER_THREADS:-3}"
          batch_rows="${BATCH_ROWS:-100000}"
          run_statistics_now="${RUN_STATISTICS_NOW:-true}"
          env_file="$ENV_FILE"
          prod_frontend_root="$PROD_FRONTEND_ROOT"
          beta_frontend_root="$BETA_FRONTEND_ROOT"
          statistics_relative_dir="$STATISTICS_RELATIVE_DIR"

          case "$deploy_target" in
            beta)
              target_roots="$beta_frontend_root"
              ;;
            production)
              target_roots="$prod_frontend_root"
              ;;
            both)
              target_roots="$beta_frontend_root $prod_frontend_root"
              ;;
            *)
              echo "Unsupported deploy target: $deploy_target" >&2
              exit 1
              ;;
          esac

          gzip -dc "$archive" | docker load

          case "$run_statistics_now" in
            1|true|TRUE|yes|YES)
              ;;
            *)
              echo "Docker image loaded. Skipping immediate statistics run because run_statistics_now=$run_statistics_now."
              rm -f "$archive"
              docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true
              exit 0
              ;;
          esac

          if [ ! -f "$env_file" ]; then
            echo "Missing statistics env file: $env_file" >&2
            exit 1
          fi

          docker_args=(
            run --rm
            --name "umamoe-statistics-${deploy_target}"
            --add-host host.docker.internal:host-gateway
            --env-file "$env_file"
            -e "UMAMOE_TARGET_ROOTS=$target_roots"
            -e "UMAMOE_STATISTICS_RELATIVE_DIR=$statistics_relative_dir"
            -e "UMAMOE_WORKER_THREADS=$worker_threads"
            -e "UMAMOE_BATCH_ROWS=$batch_rows"
          )

          if [ -n "$dataset_version" ]; then
            docker_args+=(-e "UMAMOE_DATASET_VERSION=$dataset_version")
          fi

          if [ -n "$limit" ]; then
            docker_args+=(-e "UMAMOE_LIMIT=$limit")
          fi

          for target_root in $target_roots; do
            mkdir -p "$target_root/$statistics_relative_dir"
            docker_args+=(-v "$target_root:$target_root")
          done

          docker rm -f "umamoe-statistics-${deploy_target}" >/dev/null 2>&1 || true
          docker "${docker_args[@]}" "$image_tag"

          rm -f "$archive"
          docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true
          REMOTE_SCRIPT
